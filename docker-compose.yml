version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: boss-postgres
    environment:
      POSTGRES_DB: boss_recruitment
      POSTGRES_USER: boss
      POSTGRES_PASSWORD: ${PG_PASSWORD:-boss123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 主服务：招聘自动化系统
  boss-recruitment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boss-recruitment-pro
    depends_on:
      - postgres
    ports:
      - "8321:3000"    # Dashboard (VNC+控制面板) (外部:内部)
      - "3101:3001"    # 总台/Hub管理界面 (外部:内部)
      - "5901:5901"    # VNC端口 (外部:内部)
      - "6901:6901"    # noVNC Web端口 (外部:内部)
      - "8002:8001"    # API端口 (外部8002→内部8001, 避免SSH隧道冲突)
    environment:
      - CUSTOMER_ID=${CUSTOMER_ID:-default}
      - VNC_PASSWORD=${VNC_PASSWORD:-boss123}
      - API_SECRET_KEY=${API_SECRET_KEY:-boss-recruit-secret-key-min-32-chars-2026}
      - API_PASSWORD=${API_PASSWORD:-boss-recruit-2026}
      - API_USERNAME=${API_USERNAME:-admin}
      - DISPLAY=:1
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=boss_recruitment
      - PG_USER=boss
      - PG_PASSWORD=${PG_PASSWORD:-boss123}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./job_info:/app/job_info
      - ./.env:/app/.env
      - ./app:/app/app
      - ./templates:/app/templates
      - ./web:/app/web
      - ./boss.py:/app/boss.py  # 主脚本
    restart: unless-stopped
    privileged: true  # 需要权限来控制鼠标键盘
    shm_size: '2gb'   # Chrome需要共享内存

volumes:
  pgdata:
