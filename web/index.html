<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS直聘三位一体系统 - Web管理界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        
        .header {
            background: #161b22;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }
        
        .header h1 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-badge {
            background: #238636;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-badge.stopped {
            background: #da3633;
        }
        
        .main-container {
            display: flex;
            height: calc(100vh - 56px);
        }
        
        /* 左侧：远程桌面 */
        .desktop-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30363d;
        }
        
        .desktop-header {
            background: #161b22;
            padding: 10px 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .desktop-container {
            flex: 1;
            background: #000;
            position: relative;
        }
        
        /* noVNC iframe */
        #vncFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .vnc-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #8b949e;
        }
        
        .vnc-placeholder .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .vnc-placeholder p {
            margin: 10px 0;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #238636;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #2ea043;
        }
        
        .btn-secondary {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
        }
        
        .btn-secondary:hover {
            background: #30363d;
        }
        
        .btn-danger {
            background: #da3633;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #f85149;
        }
        
        /* 右侧：控制面板 */
        .control-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: #161b22;
        }
        
        .panel-section {
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }
        
        .panel-section h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* 步骤指示器 */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
            border: 2px solid #30363d;
            transition: all 0.3s;
        }
        
        .step.active .step-circle {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }
        
        .step.completed .step-circle {
            background: #1f6feb;
            border-color: #1f6feb;
            color: #fff;
        }
        
        .step-label {
            font-size: 11px;
            color: #8b949e;
        }
        
        .step.active .step-label,
        .step.completed .step-label {
            color: #e6edf3;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .stat-card {
            background: #21262d;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-card .label {
            font-size: 11px;
            color: #8b949e;
            margin-top: 4px;
        }
        
        /* 日志区域 */
        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .log-container {
            flex: 1;
            background: #0d1117;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            margin-top: 10px;
        }
        
        .log-line {
            color: #8b949e;
        }
        
        .log-line.info { color: #e6edf3; }
        .log-line.success { color: #3fb950; }
        .log-line.error { color: #f85149; }
        .log-line.warning { color: #d29922; }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .controls .btn {
            flex: 1;
            min-width: 100px;
        }
        
        /* VNC连接状态 */
        .vnc-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .vnc-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #da3633;
        }
        
        .vnc-status.connected .dot {
            background: #3fb950;
        }
        
        /* 设置区域 */
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
        }
        
        .settings-row:last-child {
            border-bottom: none;
        }
        
        .settings-label {
            font-size: 13px;
        }
        
        .settings-input {
            width: 80px;
            padding: 6px 10px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #e6edf3;
            font-size: 13px;
        }
        
        /* 进度条 */
        .progress-bar {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #1f6feb);
            transition: width 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            🚀 BOSS直聘三位一体系统
            <span class="status-badge" id="statusBadge">待启动</span>
        </h1>
        <div style="display: flex; gap: 10px;">
            <a href="http://localhost:8321" class="btn btn-primary" style="text-decoration:none;">📊 到仪表盘</a>
            <button class="btn btn-secondary" onclick="refreshStatus()">🔄 刷新</button>
            <button class="btn btn-secondary" onclick="openVNCNewWindow()">↗️ 新窗口打开</button>
        </div>
    </div>
    
    <div class="main-container">
        <!-- 左侧：远程桌面 -->
        <div class="desktop-panel">
            <div class="desktop-header">
                <div class="vnc-status" id="vncStatus">
                    <span class="dot"></span>
                    <span>远程桌面: 未连接</span>
                </div>
                <button class="btn btn-secondary" onclick="connectVNC()">🔗 连接</button>
            </div>
            <div class="desktop-container" id="desktopContainer">
                <div class="vnc-placeholder" id="vncPlaceholder">
                    <div class="icon">🖥️</div>
                    <p>远程桌面未连接</p>
                    <p style="margin-top: 15px;">
                        <button class="btn btn-primary" onclick="connectVNC()">连接远程桌面</button>
                    </p>
                    <p style="margin-top: 20px; font-size: 12px; color: #8b949e;">
                        ⚠️ 本地精简模式：VNC远程桌面需Docker环境<br>
                        控制面板功能可直接使用API进行操作
                    </p>
                </div>
                <iframe id="vncFrame" style="display: none;"></iframe>
            </div>
        </div>
        
        <!-- 右侧：控制面板 -->
        <div class="control-panel">
            <div class="panel-section">
                <h3>📊 今日统计</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="value" id="todayGreet">0</div>
                        <div class="label">打招呼</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="todayResume">0</div>
                        <div class="label">获取简历</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="todayChat">0</div>
                        <div class="label">AI对话</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="remaining">80</div>
                        <div class="label">剩余额度</div>
                    </div>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>📍 执行进度</h3>
                <div class="steps">
                    <div class="step" id="step1">
                        <div class="step-circle">1</div>
                        <div class="step-label">打招呼</div>
                    </div>
                    <div class="step" id="step2">
                        <div class="step-circle">2</div>
                        <div class="step-label">获取简历</div>
                    </div>
                    <div class="step" id="step3">
                        <div class="step-circle">3</div>
                        <div class="step-label">AI对话</div>
                    </div>
                    <div class="step" id="step4">
                        <div class="step-circle">✓</div>
                        <div class="step-label">完成</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>⚙️ 设置</h3>
                <div class="settings-row">
                    <span class="settings-label">每日上限</span>
                    <input type="number" class="settings-input" id="dailyCap" value="80">
                </div>
                <div class="settings-row">
                    <span class="settings-label">执行间隔(秒)</span>
                    <input type="number" class="settings-input" id="interval" value="60">
                </div>
            </div>
            
            <div class="panel-section log-section">
                <h3>📋 运行日志</h3>
                <div class="log-container" id="logContainer">
                    <div class="log-line info">[系统] 等待启动...</div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" onclick="startAutomation()">▶️ 启动</button>
                    <button class="btn btn-danger" onclick="stopAutomation()">⏹️ 停止</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 配置
        const VNC_URL = 'http://localhost:6901';
        const API_URL = 'http://localhost:8001';
        
        let isRunning = false;
        let vncConnected = false;
        
        // 连接VNC远程桌面
        function connectVNC() {
            addLog('正在连接远程桌面...', 'info');
            
            const placeholder = document.getElementById('vncPlaceholder');
            const frame = document.getElementById('vncFrame');
            const status = document.getElementById('vncStatus');
            
            frame.src = VNC_URL + '?autoconnect=true';
            frame.style.display = 'block';
            placeholder.style.display = 'none';
            
            // 检测连接状态
            frame.onload = function() {
                vncConnected = true;
                status.classList.add('connected');
                status.querySelector('span:last-child').textContent = '远程桌面: 已连接';
                addLog('✅ 远程桌面已连接', 'success');
            };
            
            frame.onerror = function() {
                frame.style.display = 'none';
                placeholder.style.display = 'flex';
                status.querySelector('span:last-child').textContent = '远程桌面: 不可用 (需Docker)';
                addLog('❌ VNC远程桌面不可用 — 当前为本地精简模式，Docker未安装', 'error');
                addLog('💡 控制功能通过API直连，管理面板可正常使用', 'info');
            };
        }
        
        // 在新窗口打开VNC
        function openVNCNewWindow() {
            window.open(VNC_URL, '_blank');
        }
        
        // 启动自动化
        async function startAutomation() {
            if (isRunning) {
                addLog('⚠️ 自动化已在运行中', 'warning');
                return;
            }
            
            isRunning = true;
            document.getElementById('statusBadge').textContent = '运行中';
            document.getElementById('statusBadge').classList.remove('stopped');
            
            addLog('🚀 启动自动化流程...', 'info');
            
            try {
                // Step 1: 打招呼
                await runStep('greet', '打招呼');
                
                // Step 2: 获取简历
                await runStep('resume', '获取简历');
                
                // Step 3: AI对话
                await runStep('chat', 'AI对话');
                
                setStepStatus(4, 'completed');
                addLog('✅ 全部流程完成!', 'success');
                
            } catch (error) {
                addLog(`❌ 执行失败: ${error.message}`, 'error');
            }
            
            isRunning = false;
            document.getElementById('statusBadge').textContent = '已完成';
        }
        
        async function runStep(step, name) {
            const stepNum = step === 'greet' ? 1 : step === 'resume' ? 2 : 3;
            setStepStatus(stepNum, 'active');
            addLog(`📌 开始执行: ${name}...`, 'info');
            
            // 调用API
            try {
                const response = await fetch(`${API_URL}/api/run/${step}`, { method: 'POST' });
                const result = await response.json();
                addLog(`✅ ${name}完成: ${JSON.stringify(result)}`, 'success');
            } catch (e) {
                // API不可用时模拟
                await new Promise(resolve => setTimeout(resolve, 2000));
                addLog(`✅ ${name}完成 (模拟)`, 'success');
            }
            
            setStepStatus(stepNum, 'completed');
        }
        
        // 停止自动化
        function stopAutomation() {
            isRunning = false;
            document.getElementById('statusBadge').textContent = '已停止';
            document.getElementById('statusBadge').classList.add('stopped');
            addLog('⏹️ 已停止自动化', 'warning');
        }
        
        // 设置步骤状态
        function setStepStatus(stepNum, status) {
            const step = document.getElementById(`step${stepNum}`);
            if (step) {
                step.className = `step ${status}`;
            }
            
            // 更新进度条
            const progress = ((stepNum - 1) / 3) * 100 + (status === 'completed' ? 33 : 0);
            document.getElementById('progressFill').style.width = `${Math.min(progress, 100)}%`;
        }
        
        // 添加日志
        function addLog(message, level = 'info') {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `log-line ${level}`;
            line.textContent = `[${time}] ${message}`;
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }
        
        // 刷新状态
        async function refreshStatus() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const stats = await response.json();
                
                document.getElementById('todayGreet').textContent = stats.today_greet || 0;
                document.getElementById('todayResume').textContent = stats.today_resume || 0;
                document.getElementById('todayChat').textContent = stats.today_chat || 0;
                document.getElementById('remaining').textContent = 80 - (stats.today_greet || 0);
            } catch (e) {
                console.log('API不可用');
            }
        }
        
        // 初始化
        addLog('系统已加载，请连接远程桌面后启动自动化', 'info');
        
        // 自动连接VNC
        setTimeout(() => {
            addLog('提示: 点击"连接"按钮查看远程桌面', 'info');
        }, 1000);
    </script>
</body>
</html>
