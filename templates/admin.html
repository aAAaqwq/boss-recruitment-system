<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲲界 · 智聘 — 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --ink: #0B0F17; --deep: #102A43;
            --surface: rgba(255,255,255,.04); --elevated: rgba(120,170,255,.08);
            --text: #eaf2ff; --text2: #9fb6d8;
            --accent: #3D7CFF; --cyan: #00E5FF;
            --green: #34d399; --red: #fb7185;
            --border: rgba(120,200,255,.16);
            --grad-brand: linear-gradient(120deg, #3D7CFF 0%, #00E5FF 100%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text); padding: 28px 32px;
            display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow:hidden;
            background:
                radial-gradient(120% 70% at 90% -10%, rgba(0,229,255,.12), transparent 45%),
                radial-gradient(110% 80% at -5% 110%, rgba(61,124,255,.18), transparent 50%),
                linear-gradient(155deg, #0B0F17 0%, #102A43 70%, #0c1f33 100%);
            -webkit-font-smoothing: antialiased;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 26px;
        }
        .brand { display:flex; align-items:center; gap:12px; }
        .brand .mark {
            width:40px; height:40px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
            border-radius:12px;
            background: linear-gradient(150deg, rgba(61,124,255,.28), rgba(0,229,255,.12));
            border:1px solid rgba(120,200,255,.30);
            box-shadow: 0 6px 20px rgba(0,170,255,.28), inset 0 1px 0 rgba(255,255,255,.18);
        }
        .brand .mark svg { width:26px; height:26px; }
        .brand h1 { font-size:18px; font-weight:800; letter-spacing:1px; line-height:1.1; }
        .brand .sub { display:block; font-family:"Sora",sans-serif; font-size:9px; font-weight:600;
            letter-spacing:3px; color:var(--cyan); text-transform:uppercase; margin-top:2px; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .header-right #loginUser { color:var(--text2); font-size:13px; }
        .btn {
            padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer;
            font-size: 13px; font-weight: 600; letter-spacing:.5px; transition: all .2s cubic-bezier(.16,1,.3,1);
            font-family: inherit;
        }
        .btn-accent { background: var(--grad-brand); color: #fff; box-shadow: 0 8px 20px -8px rgba(61,124,255,.6); }
        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,229,255,.55); }
        .btn-outline { background: rgba(120,170,255,.06); border: 1px solid var(--border); color: var(--text2); }
        .btn-outline:hover { border-color: rgba(0,229,255,.4); color: var(--text); }
        .btn-danger { background: rgba(251,113,133,.15); border:1px solid rgba(251,113,133,.4); color: var(--red); }
        .btn-danger:hover { background: rgba(251,113,133,.25); }
        .btn-sm { padding: 4px 11px; font-size: 12px; margin-right: 4px; border-radius:8px; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 0; }
        .tab {
            padding: 9px 22px; background: rgba(120,170,255,.05); border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 12px 12px 0 0; color: var(--text2); cursor: pointer; font-size: 13px; font-weight:600;
            transition: all .2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { background: rgba(120,170,255,.10); color: var(--cyan); box-shadow: inset 0 2px 0 var(--cyan); }
        .panel {
            background: rgba(13,28,48,.55);
            border: 1px solid var(--border);
            border-radius: 0 14px 14px 14px; padding: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 60px -30px rgba(0,0,0,.6);
            overflow:auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--text2); padding: 11px 12px; border-bottom: 1px solid var(--border);
            font-weight: 600; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
        td { padding: 11px 12px; border-bottom: 1px solid rgba(120,200,255,.06); }
        tbody tr { transition: background .18s; }
        tbody tr:hover { background: rgba(120,170,255,.05); }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px;
            font-weight: 600; letter-spacing:.5px;
        }
        .badge-admin { background: rgba(61,124,255,.18); color: #8ab6ff; border:1px solid rgba(61,124,255,.3); }
        .badge-user { background: rgba(0,229,255,.12); color: var(--cyan); border:1px solid rgba(0,229,255,.25); }
        .badge-active { background: rgba(52,211,153,.14); color: var(--green); border:1px solid rgba(52,211,153,.3); }
        .badge-inactive { background: rgba(251,113,133,.14); color: var(--red); border:1px solid rgba(251,113,133,.3); }
        input {
            padding: 10px 12px; background: rgba(255,255,255,.06); border: 1px solid var(--border);
            border-radius: 9px; color: var(--text); font-size: 13px; margin-right: 8px; outline:none;
            font-family: inherit; transition: border-color .2s, box-shadow .2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,124,255,.14); }
        input::placeholder { color:#7c95ba; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(7,12,22,.66);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(6px);
        }
        .modal {
            background: linear-gradient(160deg, rgba(19,38,62,.96), rgba(12,24,40,.96));
            border: 1px solid var(--border);
            border-radius: 18px; padding: 26px; width: 380px;
            box-shadow: 0 40px 90px -30px rgba(0,0,0,.7);
        }
        .modal h3 { margin-bottom: 18px; font-size:16px; font-weight:700; }
        .modal input { width: 100%; margin-bottom: 11px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
        .hidden { display: none !important; }
        .msg { padding: 9px 13px; border-radius: 9px; font-size: 13px; margin-top: 12px; }
        .msg.ok { background: rgba(52,211,153,.12); color: var(--green); }
        .msg.err { background: rgba(251,113,133,.12); color: var(--red); }
    </style>
</head>
<body>
<div class="header">
    <div class="brand">
        <span class="mark">
            <svg viewBox="10 6 88 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="鲲界科技">
                <defs><linearGradient id="infAdmin" x1="52" y1="14" x2="94" y2="50" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#3D7CFF"/><stop offset="1" stop-color="#00E5FF"/></linearGradient></defs>
                <circle cx="38" cy="32" r="16" stroke="#5b8bff" stroke-width="9"/>
                <circle cx="70" cy="32" r="16" stroke="url(#infAdmin)" stroke-width="9"/>
            </svg>
        </span>
        <div>
            <h1>鲲界科技 · 管理后台</h1>
            <span class="sub">Kunjie AI Tech</span>
        </div>
    </div>
    <div class="header-right">
        <span style="color:var(--text2);font-size:13px;" id="loginUser"></span>
        <button class="btn btn-outline" onclick="location.href='/'">驾驶舱</button>
        <button class="btn btn-outline" onclick="location.href='/dashboard'">👤 我的工作台</button>
        <button class="btn btn-outline" onclick="logout()">退出</button>
    </div>
</div>

<div>
    <div class="tab-bar">
        <button class="tab active" onclick="switchPanel('users')" id="tabUsers">👥 用户管理</button>
        <button class="tab" onclick="switchPanel('stats')" id="tabStats">📊 数据统计</button>
    </div>

    <!-- 用户管理面板 -->
    <div class="panel" id="panelUsers">
        <div style="margin-bottom:16px;">
            <button class="btn btn-accent" onclick="showAddUser()">+ 添加用户</button>
            <button class="btn btn-outline" onclick="refreshUsers()" style="margin-left:8px;">🔄 刷新</button>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>用户名</th><th>显示名</th><th>角色</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
        <div id="userMsg"></div>
    </div>

    <!-- 数据统计面板 -->
    <div class="panel hidden" id="panelStats">
        <div style="margin-bottom:8px;color:var(--text2);font-size:13px;">
            每用户操作统计（打招呼/下载简历/AI回复/候选人库）
        </div>
        <table>
            <thead>
                <tr><th>用户</th><th>显示名</th><th>角色</th><th>打招呼</th><th>下载简历</th><th>AI回复</th><th>候选人</th><th>状态</th></tr>
            </thead>
            <tbody id="statsTable"></tbody>
        </table>
    </div>
</div>

<div style="position:fixed;left:0;right:0;bottom:14px;text-align:center;font-size:11.5px;letter-spacing:.5px;color:#6f8bb3;pointer-events:none;">
    鲲界科技 · KUNJIE AI TECH &nbsp;·&nbsp; Powered by <b style="color:#8fb6ff;font-weight:600;">OpenCAIO</b>
</div>

<!-- 添加用户弹窗 -->
<div class="modal-overlay hidden" id="addUserModal">
    <div class="modal">
        <h3 id="modalTitle">添加用户</h3>
        <input type="text" id="modalUser" placeholder="用户名">
        <input type="text" id="modalName" placeholder="显示名（选填）">
        <input type="password" id="modalPass" placeholder="密码">
        <input type="hidden" id="modalUserId">
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">取消</button>
            <button class="btn btn-accent" onclick="saveUser()">保存</button>
        </div>
    </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('token');
if (!token) { location.href = '/login'; }

async function fetchAPI(url, opts={}) {
    opts.headers = opts.headers || {};
    opts.headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch(API + url, opts);
    if (r.status === 401) { localStorage.clear(); location.href = '/login'; return null; }
    return r;
}

function logout() { localStorage.clear(); location.href = '/login'; }

function switchPanel(p) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + (p==='users'?'Users':'Stats')).classList.add('active');
    document.getElementById('panelUsers').classList.toggle('hidden', p!=='users');
    document.getElementById('panelStats').classList.toggle('hidden', p!=='stats');
    if (p === 'users') refreshUsers();
    if (p === 'stats') refreshStats();
}

// ── 用户管理 ──
async function refreshUsers() {
    const r = await fetchAPI('/api/users');
    if (!r || !r.ok) return;
    const data = await r.json();
    const tbody = document.getElementById('userTable');
    tbody.innerHTML = (data.users || []).map(u => `
        <tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.display_name || ''}</td>
            <td><span class="badge badge-${u.role==='admin'?'admin':'user'}">${u.role}</span></td>
            <td><span class="badge badge-${u.is_active?'active':'inactive'}">${u.is_active?'正常':'已停用'}</span></td>
            <td>${(u.created_at||'').substring(0,16)}</td>
            <td>
                <button class="btn btn-outline btn-sm" onclick="editUser(${u.id},'${u.username}','${u.display_name||''}','${u.role}')">编辑</button>
                <button class="btn btn-outline btn-sm" onclick="toggleUser(${u.id}, ${u.is_active})">${u.is_active?'停用':'启用'}</button>
                ${u.role!=='admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">删除</button>` : ''}
            </td>
        </tr>`).join('');
}

function showAddUser() {
    document.getElementById('modalTitle').textContent = '添加用户';
    document.getElementById('modalUserId').value = '';
    document.getElementById('modalUser').value = '';
    document.getElementById('modalName').value = '';
    document.getElementById('modalPass').value = '';
    document.getElementById('addUserModal').classList.remove('hidden');
}

function editUser(id, username, displayName, role) {
    document.getElementById('modalTitle').textContent = '编辑用户';
    document.getElementById('modalUserId').value = id;
    document.getElementById('modalUser').value = username;
    document.getElementById('modalName').value = displayName;
    document.getElementById('modalPass').value = '';
    document.getElementById('addUserModal').classList.remove('hidden');
}

function closeModal() { document.getElementById('addUserModal').classList.add('hidden'); }

async function saveUser() {
    const id = document.getElementById('modalUserId').value;
    const username = document.getElementById('modalUser').value.trim();
    const display_name = document.getElementById('modalName').value.trim();
    const password = document.getElementById('modalPass').value;
    if (!username) return msg('请输入用户名', 'err');

    if (id) {
        const body = { username, display_name };
        if (password) body.password = password;
        const r = await fetchAPI(`/api/users/${id}`, { method:'PUT', body:JSON.stringify(body), headers:{'Content-Type':'application/json'} });
        if (r && r.ok) { closeModal(); refreshUsers(); msg('用户已更新', 'ok'); }
        else msg('更新失败', 'err');
    } else {
        if (!password) return msg('请输入密码', 'err');
        const r = await fetch(API + '/api/auth/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username, password, display_name})
        });
        if (r.ok) { closeModal(); refreshUsers(); msg('用户已创建', 'ok'); }
        else { const d = await r.json(); msg(d.detail || '创建失败', 'err'); }
    }
}

async function toggleUser(id, current) {
    const r = await fetchAPI(`/api/users/${id}`, { method:'PUT', body:JSON.stringify({is_active:!current}), headers:{'Content-Type':'application/json'} });
    if (r && r.ok) refreshUsers();
}

async function deleteUser(id) {
    if (!confirm('确认删除此用户？')) return;
    const r = await fetchAPI(`/api/users/${id}`, { method:'DELETE' });
    if (r && r.ok) { refreshUsers(); msg('用户已删除', 'ok'); }
}

async function refreshStats() {
    const r = await fetchAPI('/api/admin/user-stats');
    if (!r || !r.ok) return;
    const data = await r.json();
    document.getElementById('statsTable').innerHTML = (data || []).map(u => `
        <tr>
            <td>${u.username}</td>
            <td>${u.display_name||''}</td>
            <td><span class="badge badge-${u.role==='admin'?'admin':'user'}">${u.role}</span></td>
            <td>${u.contact_count||0}</td>
            <td>${u.resume_count||0}</td>
            <td>${u.conv_count||0}</td>
            <td>${u.candidate_count||0}</td>
            <td><span class="badge badge-${u.is_active?'active':'inactive'}">${u.is_active?'正常':'已停用'}</span></td>
        </tr>
    `).join('');
}

function msg(t, cls) {
    const m = document.getElementById('userMsg');
    m.innerHTML = `<div class="msg ${cls}">${t}</div>`;
    setTimeout(() => m.innerHTML='', 3000);
}

// init
document.getElementById('loginUser').textContent = 'admin';
refreshUsers();
</script>
</body>
</html>
